# Scaffold — Engineers can add Dockerfiles per package
services:
  ingestion:
    build: ./backend-ingestion
    ports: ["8001:8001"]
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DATA_DIR=/data
    volumes:
      - ./data:/data
      - ./shared:/shared:ro
    command: ["python", "-m", "ingestion.cli", "serve", "--host", "0.0.0.0"]

  analysis:
    build: ./backend-analysis
    ports: ["8002:8002"]
    environment:
      - DATA_DIR=/data
      - INGESTION_API_URL=http://ingestion:8001
    volumes:
      - ./data:/data
      - ./shared:/shared:ro
    depends_on: [ingestion]
    command: ["python", "-m", "analysis.cli", "serve", "--host", "0.0.0.0"]

  frontend:
    build: ./frontend-dashboard
    ports: ["5173:5173"]
    environment:
      - VITE_INGESTION_API_URL=http://localhost:8001
      - VITE_ANALYSIS_API_URL=http://localhost:8002
    depends_on: [ingestion, analysis]
